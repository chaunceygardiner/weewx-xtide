[Extras]
    version = 2.1

[CheetahGenerator]
    search_list_extensions = user.xtide.XTideVariables
    [[ToDate]]
        [[[index]]]
            template = index.html.tmpl

[CopyGenerator]
    copy_once = xtide_icons/*, xtide.css, xtide.js

[Generators]
    generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator

[Units]
    [[StringFormats]]
        foot = %.2f
